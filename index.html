  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #090b14;

<body>
  <div class="app">
    <!-- 左栏：蓝图信息 -->
    <div class="col panel panel-left">
      <h2>蓝图信息</h2>
      <div class="stat-grid" id="stats">
        <div class="stat-box">请输入蓝图字符串并点击解析</div>
      </div>
    </div>

    <!-- 中间：3D 视图 -->
    <div class="col panel panel-center">
      <h2>3D 视图</h2>
      <div class="canvas-container">
        <canvas id="canvas3d"></canvas>
      </div>
    </div>

    <!-- 右栏：输入 -->
    <div class="col panel panel-right">
      <h2>蓝图输入</h2>
      <div style="display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; align-items:center;">
        <button id="parseButton">解析并渲染</button>
        <button id="pasteButton">粘贴</button>
        <button id="copyButton">复制</button>
        <div style="flex-basis:100%; height:0;"></div>
        <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:13px; color:#bcc8e0;">
          <input type="checkbox" id="rotateToggle" checked> 旋转
        </label>
        <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:13px; color:#bcc8e0;">
          <input type="checkbox" id="gridToggle" checked> 经度刻度
        </label>
      </div>
      <textarea id="blueprintInput" placeholder="粘贴以 DYBP: 开头的蓝图字符串"></textarea>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import { parseBlueprintString, quaternionToOrbitParams, isVisible } from './dysonBlueprintParser.js';
    import { fetchTextFile } from './fetchTextFile.js';
    import * as THREE from 'three';
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const blueprintInput = document.getElementById('blueprintInput');
    const parseButton = document.getElementById('parseButton');
    const statsElement = document.getElementById('stats');
    const canvas = document.getElementById('canvas3d');

    // 检查URL参数，如有 txt= 则自动加载并渲染
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const txtUrl = params.get('txt');
      if (txtUrl) {
        try {
          const text = await fetchTextFile(txtUrl);
          blueprintInput.value = text;
          parseButton.click();
        } catch (e) {
          clearStats();
          addStat('❌ 加载失败', e.message);
        }
      }
    })();

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x3F5C6A);
    const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 1000);
    camera.position.set(0, 1.5, 3.0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.minDistance = 0.8;
    controls.maxDistance = 20;

    // --- 均匀全方位光照 ---
    // 中心点光源（模拟恒星）
    const pointLight = new THREE.PointLight(0xffeedd, 1.2, 0, 0);
    pointLight.position.set(0, 0, 0);
    scene.add(pointLight);

    // 半球光（天空+地面柔和环境光）
    //scene.add(new THREE.HemisphereLight(0xbcc8e0, 0x556a7a, 0.8));

    // 环境光补光（均匀照亮所有面）
    scene.add(new THREE.AmbientLight(0xbcc8e0, 0.65));

    // 消除暗面：六盏弱方向灯从六个方位均匀打光
    const dirLight1 = new THREE.DirectionalLight(0xddeeff, 0.22);
    dirLight1.position.set(3, 2, 5);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xddeeff, 0.22);
    dirLight2.position.set(-3, 2, -5);
    scene.add(dirLight2);

    const dirLight3 = new THREE.DirectionalLight(0xddeeff, 0.22);
    dirLight3.position.set(5, -2, -3);
    scene.add(dirLight3);

    const dirLight4 = new THREE.DirectionalLight(0xddeeff, 0.22);
    dirLight4.position.set(-5, -2, 3);
    scene.add(dirLight4);

    const dirLight5 = new THREE.DirectionalLight(0xffddcc, 0.18);
    dirLight5.position.set(0, 3, 0);
    scene.add(dirLight5);

    const dirLight6 = new THREE.DirectionalLight(0xccddff, 0.18);
    dirLight6.position.set(0, -3, 0);
    scene.add(dirLight6);

    const rootGroup = new THREE.Group();
    scene.add(rootGroup);

    const gridGroup = new THREE.Group();
    gridGroup.name = 'longitudeGrid';
    scene.add(gridGroup);

    const clock = new THREE.Clock();
    let shellGroups = [];  // { group, pole, radius } 全局引用，供 render 旋转
    let shellRotationEnabled = true;
    const SHELL_BASE_SPEED = 0.1;  // 线性速度（rad·单位/s）

    const axesHelper = new THREE.AxesHelper(0.05);
    axesHelper.material.depthTest = false;
    axesHelper.renderOrder = 2;
    scene.add(axesHelper);

    const originSphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 32, 16),
      new THREE.MeshBasicMaterial({ color: 0xffff44, opacity: 0.5, transparent: true })
    );
    scene.add(originSphere);

    let currentScale = 1;

    function createLongitudeGrid(radius) {
      while (gridGroup.children.length) {
        const child = gridGroup.children[0];
        gridGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
      const tickLen = radius * 0.08;
      const fontSize = radius * 0.04;
      // 每 30° 一个刻度：0°, 30°, 60°, ..., 330°
      for (let deg = 0; deg < 360; deg += 30) {
        const rad = THREE.MathUtils.degToRad(deg + 180);
        const dir = new THREE.Vector3(Math.sin(rad), 0, Math.cos(rad));
        const start = dir.clone().multiplyScalar(radius);
        const end = dir.clone().multiplyScalar(radius + tickLen);
        const geom = new THREE.BufferGeometry().setFromPoints([start, end]);
        const mat = new THREE.LineBasicMaterial({ color: 0xffdd99, linewidth: 1, depthTest: false });
        gridGroup.add(new THREE.Line(geom, mat));
        // 刻度标签使用精灵
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffdd99';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`${deg}°`, 32, 24);
        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false, depthWrite: false });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.position.copy(dir.clone().multiplyScalar(radius + tickLen * 1.8));
        sprite.scale.set(fontSize * 2, fontSize, 1);
        gridGroup.add(sprite);
      }
      // 大圆环
      const ringPts = [];
      for (let i = 0; i <= 128; i++) {
        const a = (i / 128) * Math.PI * 2;
        ringPts.push(new THREE.Vector3(Math.sin(a) * radius, 0, Math.cos(a) * radius));
      }
      const ringGeom = new THREE.BufferGeometry().setFromPoints(ringPts);
      const ringMat = new THREE.LineBasicMaterial({ color: 0x556688, linewidth: 1, depthTest: false });
      gridGroup.add(new THREE.Line(ringGeom, ringMat));
      gridGroup.visible = document.getElementById('gridToggle').checked;
    }

    function resizeRenderer() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      if (canvas.width !== width || canvas.height !== height) {
        renderer.setSize(width, height, false);
      }
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    window.addEventListener('resize', () => {
      resizeRenderer();
    });

    function render() {
      resizeRenderer();
      const dt = Math.min(clock.getDelta(), 0.1);
      if (shellRotationEnabled) {
        const maxR = currentScale > 0 ? 1 / currentScale : 1;
        for (const sg of shellGroups) {
          const omega = SHELL_BASE_SPEED * maxR / sg.radius;
          const rot = new THREE.Quaternion().setFromAxisAngle(sg.pole, omega * dt);
          sg.group.quaternion.premultiply(rot);
        }
      }
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);

    function addStat(label, value) {
      const box = document.createElement('div');
      box.className = 'stat-box';
      box.innerHTML = `<strong>${label}</strong><br>${value}`;
      statsElement.appendChild(box);
    }

    function clearStats() {
      statsElement.innerHTML = '';
    }

    function clearScene() {
      shellGroups.length = 0;
      while (rootGroup.children.length) {
        const child = rootGroup.children[0];
        rootGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach(m => m.dispose());
          } else {
            child.material.dispose();
          }
        }
      }
    }

    function convertBlueprintPosition(coord) {
      // 蓝图坐标系与 Three.js 坐标系的 Z 轴方向相反，修正镜像
      return new THREE.Vector3(coord.x, coord.y, -coord.z);
    }

    function normalizeQuaternion(orbit) {
      const q = new THREE.Quaternion(orbit.x, orbit.y, orbit.z, orbit.w);
      q.normalize();
      return q;
    }

    function colorIsValid(color) {
      // RGBA 或 HSVA 通用检测
      if (!color) return false;
      if (typeof color.r === 'number') return true;  // RGBA
      if (typeof color.h === 'number') return true;  // HSVA
      return false;
    }

    function toHexColor(color, defaultColor) {
      if (!colorIsValid(color)) return defaultColor;
      // RGBA 颜色
      if (typeof color.r === 'number') {
        if (color.a === 0) return defaultColor;
        return (color.r << 16) | (color.g << 8) | color.b;
      }
      // HSVA 颜色：H(0-1)/S(0-1) 转 RGB，V 强制=1
      if (typeof color.h === 'number') {
        if (color.a === 0) return defaultColor;
        const h = color.h, s = color.s;
        const hAngle = (h * 360) % 360;
        const c = s;
        const x = c * (1 - Math.abs((hAngle / 60) % 2 - 1));
        let r = 0, g = 0, b = 0;
        if (hAngle < 60) { r = c; g = x; }
        else if (hAngle < 120) { r = x; g = c; }
        else if (hAngle < 180) { g = c; b = x; }
        else if (hAngle < 240) { g = x; b = c; }
        else if (hAngle < 300) { r = x; b = c; }
        else { r = c; b = x; }
        const m = 1 - c;
        return (Math.round((r+m)*255)<<16) | (Math.round((g+m)*255)<<8) | Math.round((b+m)*255);
      }
      return defaultColor;
    }

    function colorOpacity(color, defaultOpacity = 1) {
      if (!colorIsValid(color)) return defaultOpacity;
      // RGBA：a=0-255
      if (typeof color.r === 'number') {
        if (color.a === 0 || typeof color.a !== 'number') return defaultOpacity;
        return Math.max(0, Math.min(1, color.a / 255));
      }
      // HSVA：a=0-1
      if (typeof color.h === 'number') {
        if (color.a === 0 || typeof color.a !== 'number') return defaultOpacity;
        return Math.max(0, Math.min(1, color.a));
      }
      return defaultOpacity;
    }

    function createOrbitRing(radius, orbit, color = 0x00b7ff, opacity = 0.9) {
      const q = normalizeQuaternion(orbit);
      const segments = 128;
      const points = [];
      for (let i = 0; i <= segments; i += 1) {
        const theta = (i / segments) * Math.PI * 2;
        const point = new THREE.Vector3(Math.cos(theta) * radius, 0, Math.sin(theta) * radius);
        point.applyQuaternion(q);
        points.push(convertBlueprintPosition(point));
      }
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color, opacity, transparent: opacity < 1 });
      return new THREE.LineLoop(geometry, material);
    }

    function createNodeSphere(position, id, color = 0x44ffb8, opacity = 1) {
      const geometry = new THREE.SphereGeometry(50 * currentScale, 8, 8);
      const material = new THREE.MeshStandardMaterial({ color, emissive: 0x0a2f20, metalness: 0.2, roughness: 0.6, transparent: opacity < 1, opacity });
      const sphere = new THREE.Mesh(geometry, material);
      sphere.position.copy(position);
      sphere.name = `node-${id}`;
      return sphere;
    }

    function normalizeLongitude(delta) {
      return ((delta + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;
    }

    function createSphericalArcPoints(from, to, segments = 36) {
      const radius = (from.length() + to.length()) / 2;
      const fromN = from.clone().normalize();
      const toN = to.clone().normalize();
      const dot = THREE.MathUtils.clamp(fromN.dot(toN), -1, 1);
      const angle = Math.acos(dot);

      const axis = new THREE.Vector3().crossVectors(fromN, toN);
      if (axis.lengthSq() < 1e-6) {
        const points = [];
        for (let i = 0; i <= segments; i += 1) {
          points.push(fromN.clone().lerp(toN, i / segments).normalize().multiplyScalar(radius));
        }
        return points;
      }

      axis.normalize();
      const points = [];
      for (let i = 0; i <= segments; i += 1) {
        const theta = (i / segments) * angle;
        points.push(fromN.clone().applyAxisAngle(axis, theta).multiplyScalar(radius));
      }
      return points;
    }

    function toLatLon(pos, pole = new THREE.Vector3(0, 1, 0)) {
      // 纬度 = asin(dot(pole, pos)/r)，经度需用 pole 的垂直基
      const r = pos.length();
      const poleN = (pole ?? new THREE.Vector3(0, 1, 0)).clone().normalize();
      const lat = Math.asin(THREE.MathUtils.clamp(pos.dot(poleN) / r, -1, 1));
      // 经度基：基于 pole 的切平面
      const ref = Math.abs(poleN.x) < 0.99
        ? new THREE.Vector3(1, 0, 0)
        : new THREE.Vector3(0, 1, 0);
      const east = new THREE.Vector3().crossVectors(ref, poleN).normalize();
      if (east.lengthSq() < 1e-6) {
        east.crossVectors(new THREE.Vector3(0, 0, 1), poleN).normalize();
      }
      const north = new THREE.Vector3().crossVectors(poleN, east).normalize();
      const px = pos.dot(east);
      const py = pos.dot(north);
      const lon = Math.atan2(px, py);
      return { lat, lon, r };
    }

    function latLonToWorld(lat, lon, r, pole = new THREE.Vector3(0, 1, 0)) {
      const poleN = (pole ?? new THREE.Vector3(0, 1, 0)).clone().normalize();
      const ref = Math.abs(poleN.x) < 0.99
        ? new THREE.Vector3(1, 0, 0)
        : new THREE.Vector3(0, 1, 0);
      const east = new THREE.Vector3().crossVectors(ref, poleN).normalize();
      if (east.lengthSq() < 1e-6) {
        east.crossVectors(new THREE.Vector3(0, 0, 1), poleN).normalize();
      }
      const north = new THREE.Vector3().crossVectors(poleN, east).normalize();
      const cosLat = Math.cos(lat);
      return new THREE.Vector3()
        .addScaledVector(east, r * cosLat * Math.sin(lon))
        .addScaledVector(north, r * cosLat * Math.cos(lon))
        .addScaledVector(poleN, r * Math.sin(lat));
    }

    function createGridArcPoints(from, to, segments = 18, pole = null) {
      const safePole = pole ?? new THREE.Vector3(0, 1, 0);
      const a = toLatLon(from, safePole);
      const b = toLatLon(to, safePole);
      const maxAbsLat = Math.max(Math.abs(a.lat), Math.abs(b.lat));
      const nearPole = maxAbsLat > Math.PI * 0.49;  // 纬度 > 85° 视为近极点

      let dLon = b.lon - a.lon;
      // 归一化经度差到 [-π, π]
      while (dLon > Math.PI) dLon -= 2 * Math.PI;
      while (dLon < -Math.PI) dLon += 2 * Math.PI;

      const points = [];
      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        let p;
        if (nearPole) {
          // 近极点：使用球面大圆弧（Slerp），避免经纬度插值扭曲
          const fromN = from.clone().normalize();
          const toN = to.clone().normalize();
          const dot = THREE.MathUtils.clamp(fromN.dot(toN), -1, 1);
          const angle = Math.acos(dot);
          if (angle < 1e-6) {
            p = latLonToWorld(a.lat + t * (b.lat - a.lat), a.lon + t * dLon, a.r + t * (b.r - a.r), safePole);
          } else {
            const sinA = Math.sin((1 - t) * angle);
            const sinB = Math.sin(t * angle);
            p = new THREE.Vector3()
              .addScaledVector(fromN, sinA / Math.sin(angle))
              .addScaledVector(toN, sinB / Math.sin(angle))
              .normalize()
              .multiplyScalar(a.r + t * (b.r - a.r));
          }
        } else {
          const lat = a.lat + t * (b.lat - a.lat);
          const lon = a.lon + t * dLon;
          const r = a.r + t * (b.r - a.r);
          p = latLonToWorld(lat, lon, r, safePole);
        }
        points.push(p);
      }
      return points;
    }

    function createLineSegment(from, to, color = 0xffffff, type = 0, pole = null) {
      let points;
      if (type === 1 && pole) {
        // 经纬线：沿纬度/经度方向的球面网格弧线（须有极点方向）
        points = createGridArcPoints(from, to, 18, pole);
      } else {
        // 测地线（type 0 / pole 为空）：球面大圆弧（最短路径）
        points = createSphericalArcPoints(from, to, 18);
      }
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color, linewidth: 2 });
      return new THREE.Line(geometry, material);
    }

    function createFaceMesh(points, color = 0x00b7ff, opacity = 0.25, pole = null, edgeTypes = null) {
      if (points.length < 3) return null;

      const avgRadius = points.reduce((sum, p) => sum + p.length(), 0) / points.length;
      // 始终使用原始顶点坐标，与框架线端点保持一致
      const spherePoints = points.map((p) => p.clone());

      // 有边类型信息：每条边按自己的类型独立细分，纯/混合面流程一致
      if (edgeTypes) {
        const geoSegs = 3, gridSegs = 5;
        const refined = [];
        for (let i = 0; i < points.length; i++) {
          const from = points[i];
          const to = points[(i+1) % points.length];
          const sub = edgeTypes[i] === 1 && pole
            ? createGridArcPoints(from, to, gridSegs, pole)
            : createSphericalArcPoints(from, to, geoSegs);
          for (let j = 0; j < sub.length - 1; j++) refined.push(sub[j]);
        }
        return createFaceMesh(refined, color, opacity, pole, null);
      }

      const vertices = [];
      const indices = [];

      const addVertex = (vertex) => {
        vertices.push(vertex.x, vertex.y, vertex.z);
        return (vertices.length / 3) - 1;
      };

      const subdivideTriangleSpherical = (a, b, c, divisions = 3) => {
        const ra = a.length(), rb = b.length(), rc = c.length();
        const rowIndices = [];
        for (let i = 0; i <= divisions; i += 1) {
          const row = [];
          for (let j = 0; j <= divisions - i; j += 1) {
            const k = divisions - i - j;
            const tA = i / divisions;
            const tB = j / divisions;
            const tC = k / divisions;
            const r = tA * ra + tB * rb + tC * rc;
            const point = new THREE.Vector3()
              .addScaledVector(a, tA)
              .addScaledVector(b, tB)
              .addScaledVector(c, tC)
              .normalize()
              .multiplyScalar(r);
            row.push(addVertex(point));
          }
          rowIndices.push(row);
        }

        for (let i = 0; i < rowIndices.length - 1; i += 1) {
          const current = rowIndices[i];
          const next = rowIndices[i + 1];
          for (let j = 0; j < current.length - 1; j += 1) {
            const aIndex = current[j];
            const bIndex = current[j + 1];
            const cIndex = next[j];
            const dIndex = next[j + 1];
            indices.push(aIndex, bIndex, cIndex);
            if (j < current.length - 2) {
              indices.push(bIndex, dIndex, cIndex);
            }
          }
        }
      };

      // ---------- 2D ear-clipping 辅助 ----------
      function earClipFlat(polygon) {
        const triangles = [];
        const remaining = polygon.slice();
        function signedArea(a, b, c) {
          return (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x);
        }
        function isConvex(prev, curr, next) {
          return signedArea(prev, curr, next) > 0;
        }
        function pointInTriangle(pt, a, b, c) {
          const d1 = signedArea(pt, a, b);
          const d2 = signedArea(pt, b, c);
          const d3 = signedArea(pt, c, a);
          const hasNeg = (d1 < 0) || (d2 < 0) || (d3 < 0);
          const hasPos = (d1 > 0) || (d2 > 0) || (d3 > 0);
          return !(hasNeg && hasPos);
        }

        while (remaining.length > 3) {
          let earFound = false;
          for (let i = 0; i < remaining.length; i++) {
            const prev = remaining[(i - 1 + remaining.length) % remaining.length];
            const curr = remaining[i];
            const next = remaining[(i + 1) % remaining.length];
            if (!isConvex(prev, curr, next)) continue;
            let isEar = true;
            for (let j = 0; j < remaining.length; j++) {
              if (j === (i - 1 + remaining.length) % remaining.length ||
                  j === i ||
                  j === (i + 1) % remaining.length) continue;
              if (pointInTriangle(remaining[j], prev, curr, next)) {
                isEar = false;
                break;
              }
            }
            if (isEar) {
              triangles.push([prev.idx, curr.idx, next.idx]);
              remaining.splice(i, 1);
              earFound = true;
              break;
            }
          }
          if (!earFound) {
            const base = remaining[0];
            for (let i = 1; i < remaining.length - 1; i++) {
              triangles.push([base.idx, remaining[i].idx, remaining[i + 1].idx]);
            }
            break;
          }
        }
        if (remaining.length === 3) {
          triangles.push([remaining[0].idx, remaining[1].idx, remaining[2].idx]);
        }
        return triangles;
      }

      // 切平面投影 + ear-clipping
      const faceNormal = new THREE.Vector3();
      for (let i = 0; i < spherePoints.length; i++) {
        const curr = spherePoints[i];
        const next = spherePoints[(i + 1) % spherePoints.length];
        faceNormal.x += (curr.y - next.y) * (curr.z + next.z);
        faceNormal.y += (curr.z - next.z) * (curr.x + next.x);
        faceNormal.z += (curr.x - next.x) * (curr.y + next.y);
      }
      faceNormal.normalize();

      const refX = Math.abs(faceNormal.x) < 0.99
        ? new THREE.Vector3(1, 0, 0)
        : new THREE.Vector3(0, 1, 0);
      const axisU = new THREE.Vector3().crossVectors(refX, faceNormal).normalize();
      const axisV = new THREE.Vector3().crossVectors(faceNormal, axisU).normalize();
      const centroid3D = spherePoints.reduce((acc, p) => acc.add(p), new THREE.Vector3()).multiplyScalar(1 / spherePoints.length);
      const flatPoints = spherePoints.map((p) => {
        const d = p.clone().sub(centroid3D);
        return { x: d.dot(axisU), y: d.dot(axisV) };
      });
      const polygon = flatPoints.map((p, idx) => ({ x: p.x, y: p.y, idx }));
      const triangles_2d = earClipFlat(polygon);

      // 测地线面片：球面法线方向细分
      triangles_2d.forEach(([aIdx, bIdx, cIdx]) => {
          if (aIdx >= spherePoints.length || bIdx >= spherePoints.length || cIdx >= spherePoints.length) return;
          subdivideTriangleSpherical(spherePoints[aIdx], spherePoints[bIdx], spherePoints[cIdx], 3);
        });

      if (triangles_2d.length === 0) return null;

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      const material = new THREE.MeshStandardMaterial({
        color,
        opacity,
        transparent: opacity < 1,
        side: THREE.DoubleSide,
        depthWrite: true,
      });
      return new THREE.Mesh(geometry, material);
    }

    function edgeKey(id1, id2) {
      return id1 < id2 ? `${id1}-${id2}` : `${id2}-${id1}`;
    }


    function parseAndRender(blueprintText) {
      clearScene();
      clearStats();
      const result = {
        header: null,
        body: null,
      };

      return parseBlueprintString(blueprintText).then((parsed) => {

        const cloud = parsed.body.dysonCloud;
        const shell = parsed.body.dysonShell ?? (parsed.body.singleShell ? { shells: [parsed.body.singleShell], orbitList: [{ id: 0, radius: 10000.0, x: 0, y: 0, z: 0, w: 1 }] } : null);
        // 最大半径：仅由云/壳轨道半径确定（节点应映射在轨道球面上）
        const shellOrbitRadii = shell?.orbitList?.filter(Boolean).map((o) => o.radius) ?? [];
        const cloudOrbitRadii = cloud?.orbits?.filter(Boolean).map((o) => o.radius) ?? [];
        const allRadii = shellOrbitRadii.concat(cloudOrbitRadii);
        const maxRadius = allRadii.length > 0
          ? Math.max(1, ...allRadii)
          : (shell?.shells?.[0]?.nodes
              ? Math.max(1, ...shell.shells[0].nodes.slice(1).filter(Boolean).map(n => Math.hypot(n.coordinate.x, n.coordinate.y, n.coordinate.z)))
              : 1);

        currentScale = 1 / maxRadius;

        const baseSphereRadius = 1;  // maxRadius * currentScale ≡ 1
        const sphereGeometry = new THREE.SphereGeometry(baseSphereRadius, 48, 32);
        const sphereMaterial = new THREE.MeshStandardMaterial({
          color: 0x112946,
          opacity: 0.0,
          transparent: true,
        });
        const sphereMesh = new THREE.Mesh(sphereGeometry, sphereMaterial);
        rootGroup.add(sphereMesh);

        // 
        if (shell?.orbitList) {
          let hasFillGridWarning = false;
            for (let i = 0; i < shell.orbitList.length; i++) {
              const orbit = shell.orbitList[i];
              if (!orbit) continue;
              const shData = shell.shells?.[orbit.id] ?? null;
              if (!hasFillGridWarning && shData?.fillGrid?.colors) {
                for (const cc of shData.fillGrid.colors) {
                    if (cc && cc.a) { hasFillGridWarning = true; break; }
                  }
              }
            }
          if (hasFillGridWarning) addStat('⚡ 蓝图含有网格涂色', '当前不支持蓝图的网格涂色，颜色不能正确显示');
        }

        addStat('蓝图类型', parsed.header.typeName || '未知');
        addStat('蓝图版本', parsed.header.version);
        addStat('创建时间', parsed.header.createdAt);

        // 云轨道环线
        if (cloud?.orbits) {
          cloud.orbits.forEach((orb, idx) => {
            if (!orb) return;
            const vis = cloud.visibility ? isVisible(cloud.visibility.inGame, orb.id) : true;
            // 统计
            const op = quaternionToOrbitParams(orb);
            const tag = vis ? '' : ' [隐藏]';
            addStat('云轨道 '+orb.id+tag, '半径 '+orb.radius.toFixed(1)+' / 倾角 '+op.inclination.toFixed(0)+'° / 升交点 '+op.ascendingNode.toFixed(1)+'°');
            // 渲染
            if (!vis) return;
            const r = orb.radius * currentScale;
            const e = cloud.colors?.[orb.id] ?? cloud.colors?.[orb.id-1] ?? cloud.colors?.[idx];
            const ring = createOrbitRing(r, orb, toHexColor(e, 0xffcba6), colorOpacity(e, 0.9));
            ring.name = 'cloud-orbit-'+idx;
            rootGroup.add(ring);
          });
        }

        // 壳层
        shellGroups = [];  // 清空并重新填充
        if (shell?.orbitList) {
          for (let i = 0; i < shell.orbitList.length; i++) {
            const orbit = shell.orbitList[i];
            if (!orbit) continue;
            const vis = shell.visibility ? isVisible(shell.visibility.inGame, orbit.id) : true;
            const shData = shell.shells?.[orbit.id] ?? null;
            //统计
            const nodeCnt = shData?.nodes ? shData.nodes.filter(Boolean).length : 0;
            const frameCnt = shData?.frames ? shData.frames.filter(Boolean).length : 0;
            const faceCnt = shData?.faces ? shData.faces.filter(Boolean).length : 0;
            if (parsed.header.typeId === 1) {
              addStat('壳层', '节点'+nodeCnt+' 框架'+frameCnt+' 壳面'+faceCnt);
            } else {
              const tag = vis ? '' : ' [隐藏]';
              const op = quaternionToOrbitParams(orbit);
              addStat('壳轨道 '+orbit.id+tag, '半径 '+orbit.radius.toFixed(1)+' / 倾角 '+op.inclination.toFixed(1)+'° / 升交点 '+op.ascendingNode.toFixed(1)+'° / 节点'+nodeCnt+' 框架'+frameCnt+' 壳面'+faceCnt+tag);
            }
            // 渲染
            if (!shData) continue;
            if (!vis) continue;
            const shQuat = normalizeQuaternion(orbit);
            const poleRaw = new THREE.Vector3(0, 1, 0);
            poleRaw.applyQuaternion(shQuat);
            const shPole = convertBlueprintPosition(poleRaw);

            // 每层壳独立 Group，用于独立旋转
            const shellGroup = new THREE.Group();
            shellGroups.push({ group: shellGroup, pole: shPole.clone().normalize(), radius: orbit.radius });

            // 节点
            const nodeMap = new Map();
            if (shData.nodes) {
              for (let ni = 1; ni < shData.nodes.length; ni++) {
                const nd = shData.nodes[ni];
                if (!nd) continue;
                const d = new THREE.Vector3(nd.coordinate.x, nd.coordinate.y, nd.coordinate.z).normalize();
                d.applyQuaternion(shQuat);
                const pos = convertBlueprintPosition(d).multiplyScalar(orbit.radius * currentScale);
                nodeMap.set(nd.id, pos);
                shellGroup.add(createNodeSphere(pos, nd.id, toHexColor(nd.color, 0x60D6FD), colorOpacity(nd.color, 1)));
              }
            }

            // 框架
            const renderedEdges = new Set();
            const frameEdges = new Set();
            const ftMap = new Map();
            const re = (id1, id2, color, type = 0) => {
              const k = id1 < id2 ? id1+"-"+id2 : id2+"-"+id1;
              if (renderedEdges.has(k)) return;
              renderedEdges.add(k);
              const f = nodeMap.get(id1), t = nodeMap.get(id2);
              if (f && t) shellGroup.add(createLineSegment(f, t, color, type, shPole));
            };
            if (shData.frames) {
              shData.frames.forEach((fr) => {
                if (!fr) return;
                const k = edgeKey(fr.structureRelation[0], fr.structureRelation[1]);
                frameEdges.add(k); ftMap.set(k, fr.type);
                re(fr.structureRelation[0], fr.structureRelation[1], toHexColor(fr.color, 0x175473), fr.type);
              });
            }

            // 壳面
            if (shData.faces) {
              shData.faces.forEach((fc) => {
                if (!fc || !Array.isArray(fc.relation) || fc.relation.length < 3) return;
                if (fc.relation.some(nid => !nodeMap.has(nid))) return;
                const rel = fc.relation.slice();
                const pts = rel.map(nid => nodeMap.get(nid));
                if (pts.some(p => !p)) return;
                const edgeTypes = rel.map((_, j) => ftMap.get(edgeKey(rel[j], rel[(j+1)%rel.length])) ?? 0);
                const m = createFaceMesh(pts, toHexColor(fc.color, 0x175473), colorOpacity(fc.color, 1), shPole, edgeTypes);
                if (m) shellGroup.add(m);
              });
            }

            rootGroup.add(shellGroup);
          }
        }
        
        createLongitudeGrid(baseSphereRadius * 1.2);

        camera.position.set(0, baseSphereRadius * 2.2, baseSphereRadius * 3.2);
        controls.target.set(0, 0, 0);
        controls.update();
      }).catch((error) => {
        clearScene();
        clearStats();
        addStat('❌ 解析失败', error.message);
      });
    }

    document.getElementById('pasteButton').addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        blueprintInput.value = text;
      } catch {
        alert('无法读取剪贴板，请手动粘贴');
      }
    });

    document.getElementById('copyButton').addEventListener('click', async () => {
      const text = blueprintInput.value.trim();
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        alert('成功复制到剪贴板');
      } catch {
        alert('无法复制到剪贴板');
      }
    });

    document.getElementById('gridToggle').addEventListener('change', (e) => {
      gridGroup.visible = e.target.checked;
    });

    document.getElementById('rotateToggle').addEventListener('change', (e) => {
      shellRotationEnabled = e.target.checked;
    });

    parseButton.addEventListener('click', async () => {
      const text = blueprintInput.value.trim();
      if (!text) return;
      parseButton.disabled = true;
      parseButton.textContent = '解析中...';
      try {
        await parseAndRender(text);
      } finally {
        parseButton.disabled = false;
        parseButton.textContent = '解析并渲染';
      }
    });
  </script>
</body>
</html>
