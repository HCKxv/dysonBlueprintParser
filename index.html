  <title>戴森球蓝图预览</title>
  <style>
    body {margin:0;min-height:100vh;background:#090b14;color:#e7ebff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    .app {display:grid;grid-template-columns:320px 1fr 380px;gap:12px;padding:10px;height:100vh;width:100%;}
    .col {display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
    * {box-sizing:border-box;}
    textarea {width:100%;flex:1;min-height:0;padding:14px;border-radius:14px;border:1px solid #23334f;background:#101624;color:#eef2ff;font-size:14px;resize:none;}
    button {width:fit-content;padding:12px 18px;border:none;border-radius:12px;background:#4364eb;color:white;font-size:15px;cursor:pointer;}
    button:disabled {opacity:0.55;cursor:default;}
    .panel {background:#0f1628;border:1px solid #243556;border-radius:16px;padding:14px;}
    .panel h2 {margin:0 0 10px;font-size:1.1rem;}
    .canvas-container {flex:1;position:relative;width:100%;min-height:0;border-radius:16px;overflow:hidden;background:#05080e;}
    canvas {width:100%;height:100%;display:block;}
    .stat-grid {display:flex;flex-direction:column;gap:6px;}
    .stat-box {padding:8px 12px;background:#111926;border:1px solid #1e3657;border-radius:10px;font-size:13px;line-height:1.4;}
    .panel-left h2 {margin:0 0 8px;font-size:1.0rem;}
    textarea::-webkit-scrollbar {width:6px;}
    textarea::-webkit-scrollbar-thumb {background:#334;border-radius:3px;}
    .panel-right {min-width:0;}
    .panel-right h2 {margin:0 0 8px;font-size:1.0rem;flex-shrink:0;}
    .panel-right button {flex-shrink:0;}
    .panel-center {display:flex;flex-direction:column;}
    .panel-center h2 {margin:0 0 8px;font-size:1.0rem;}
    .label {display:inline-block;width:4em;text-align-last:justify;text-align:justify;}
  </style>
</head>
<body>
<div class="app">
  <div class="col panel panel-left">
    <h2>蓝图信息</h2>
    <div class="stat-grid" id="stats"><div class="stat-box">请输入蓝图字符串并点击解析</div></div>
  </div>
  <div class="col panel panel-center">
    <h2>蓝图预览</h2>
    <div class="canvas-container"><canvas id="canvas3d"></canvas></div>
  </div>
  <div class="col panel panel-right">
    <div id="powerPanel" style="text-align:center;padding:12px 0;border-bottom:1px solid #243556;margin-bottom:8px;">
      <div id="powerMain" style="font-size:2.2rem;font-weight:700;color:#ffd866;line-height:1.2;">⚡ 0&thinsp;W</div>
      <div style="margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:#bcc8e0;flex-wrap:wrap;">
        <span id="radiusLabel" class="label">半径</span> <input type="number" id="shellRadiusInput" value="10000" step="100" min="1000" style="width:80px;padding:4px 8px;border-radius:6px;border:1px solid #23334f;background:#101624;color:#eef2ff;font-size:13px;text-align:center;">
        光度系数 <input type="number" id="luminosityInput" value="1.0" step="0.1" min="0.1" style="width:70px;padding:4px 8px;border-radius:6px;border:1px solid #23334f;background:#101624;color:#eef2ff;font-size:13px;text-align:center;">
        <button id="recalcButton" disabled style="padding:4px 10px;font-size:12px;border-radius:6px;">重新计算</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;align-items:center;">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:13px;color:#bcc8e0;"><input type="checkbox" id="rotateToggle" checked> 旋转</label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:13px;color:#bcc8e0;"><input type="checkbox" id="gridToggle" checked> 刻度</label>
    </div>
    <h2>蓝图输入</h2>
    <div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;align-items:center;">
      <button id="parseButton">解析并预览</button>
      <button id="pasteButton">粘贴</button>
      <button id="copyButton">复制</button>
    </div>
    <textarea id="blueprintInput" placeholder="粘贴以 DYBP: 开头的蓝图字符串"></textarea>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/" } }
</script>

<script type="module">
import { parseBlueprintString, quaternionToOrbitParams, isVisible } from './dysonBlueprintParser.js';
import { computePoints, computePower } from './dysonSpherePower.js';
import { fetchTextFile } from './fetchTextFile.js';
import * as THREE from 'three';
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const blueprintInput = document.getElementById('blueprintInput');
const parseButton = document.getElementById('parseButton');
const statsElement = document.getElementById('stats');
const canvas = document.getElementById('canvas3d');

(async () => {
  const params = new URLSearchParams(window.location.search);
  const txtUrl = params.get('txt');
  if (txtUrl) {
    try {
      const text = await fetchTextFile(txtUrl);
      blueprintInput.value = text;
      parseButton.click();
    } catch (e) { clearStats(); addStat('❌ 加载失败', e.message); }
  }
})();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x3F5C6A);
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 1000);
camera.position.set(0, 1.5, 3.0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.minDistance = 0.8;
controls.maxDistance = 20;

const pointLight = new THREE.PointLight(0xffdd55, 1.2, 0, 0);
pointLight.position.set(0, 0, 0);
scene.add(pointLight);

function updateSunColor(luminosity) {
  const lum = Math.max(0.01, Math.min(10, luminosity));
  let color;
  if (lum <= 0.8) color = new THREE.Color(0xff8855);
  else if (lum < 1.3) color = new THREE.Color(0xffdd55);
  else if (lum < 1.8) color = new THREE.Color(0xf0f4ff);
  else color = new THREE.Color(0x5588ff);
  pointLight.color.copy(color);
  originSphere.material.color.copy(color);
}

scene.add(new THREE.AmbientLight(0xffffff, 1.2));

const rootGroup = new THREE.Group();
scene.add(rootGroup);

const gridGroup = new THREE.Group();
gridGroup.name = 'longitudeGrid';
scene.add(gridGroup);

const clock = new THREE.Clock();
let shellGroups = [];
let shellRotationEnabled = true;
const SHELL_BASE_SPEED = 0.05;

const axesHelper = new THREE.AxesHelper(0.05);
axesHelper.material.depthTest = false;
axesHelper.renderOrder = 2;
scene.add(axesHelper);

const originSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.05, 32, 16),
  new THREE.MeshBasicMaterial({ color: 0xffdd55, opacity: 0.8, transparent: true })
);
scene.add(originSphere);

let currentScale = 1;

function createLongitudeGrid(radius) {
  while (gridGroup.children.length) {
    const child = gridGroup.children[0];
    gridGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  const tickLen = radius * 0.08;
  const fontSize = radius * 0.04;
  for (let deg = 0; deg < 360; deg += 30) {
    const rad = THREE.MathUtils.degToRad(deg + 180);
    const dir = new THREE.Vector3(Math.sin(rad), 0, Math.cos(rad));
    const start = dir.clone().multiplyScalar(radius);
    const end = dir.clone().multiplyScalar(radius + tickLen);
    const geom = new THREE.BufferGeometry().setFromPoints([start, end]);
    const mat = new THREE.LineBasicMaterial({ color: 0xffdd99 });
    gridGroup.add(new THREE.Line(geom, mat));
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 64; labelCanvas.height = 32;
    const ctx = labelCanvas.getContext('2d');
    ctx.fillStyle = '#ffdd99';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${deg}°`, 32, 24);
    const texture = new THREE.CanvasTexture(labelCanvas);
    texture.minFilter = THREE.LinearFilter;
    const spriteMat = new THREE.SpriteMaterial({ map: texture, depthWrite: false });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(dir.clone().multiplyScalar(radius + tickLen * 1.8));
    sprite.scale.set(fontSize * 2, fontSize, 1);
    gridGroup.add(sprite);
  }
  const ringPts = [];
  for (let i = 0; i <= 128; i++) {
    const a = (i / 128) * Math.PI * 2;
    ringPts.push(new THREE.Vector3(Math.sin(a) * radius, 0, Math.cos(a) * radius));
  }
  const ringGeom = new THREE.BufferGeometry().setFromPoints(ringPts);
  const ringMat = new THREE.LineBasicMaterial({ color: 0x556688 });
  gridGroup.add(new THREE.Line(ringGeom, ringMat));
  gridGroup.visible = document.getElementById('gridToggle').checked;
}

function resizeRenderer() {
  const width = canvas.clientWidth, height = canvas.clientHeight;
  if (canvas.width !== width || canvas.height !== height) renderer.setSize(width, height, false);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resizeRenderer);

function render() {
  resizeRenderer();
  const dt = Math.min(clock.getDelta(), 0.1);
  if (shellRotationEnabled) {
    const maxR = currentScale > 0 ? 1 / currentScale : 1;
    for (const sg of shellGroups) {
      const omega = SHELL_BASE_SPEED * maxR / sg.radius;
      const rot = new THREE.Quaternion().setFromAxisAngle(sg.pole, omega * dt);
      sg.group.quaternion.premultiply(rot);
    }
  }
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

const visObjects = new Map();
function addStat(label, value) {
  const box = document.createElement('div');
  box.className = 'stat-box';
  box.innerHTML = `<strong>${label}</strong><br>${value}`;
  statsElement.appendChild(box);
}
function addStatToggle(key, label, value, defChecked) {
  const box = document.createElement('div');
  box.className = 'stat-box';
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.checked = defChecked;
  cb.style.cssText = 'margin-right:4px;vertical-align:middle;';
  cb.addEventListener('change', () => { const obj = visObjects.get(key); if (obj) obj.visible = cb.checked; });
  box.appendChild(cb);
  const span = document.createElement('span');
  span.innerHTML = `<strong>${label}</strong><br>${value}`;
  box.appendChild(span);
  statsElement.appendChild(box);
}
function clearStats() { statsElement.innerHTML = ''; }
function clearScene() {
  shellGroups.length = 0;
  while (rootGroup.children.length) {
    const child = rootGroup.children[0];
    rootGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) { if (Array.isArray(child.material)) child.material.forEach(m => m.dispose()); else child.material.dispose(); }
  }
}

function convertBlueprintPosition(coord) { return new THREE.Vector3(coord.x, coord.y, -coord.z); }

function normalizeQuaternion(orbit) { const q = new THREE.Quaternion(orbit.x, orbit.y, orbit.z, orbit.w); q.normalize(); return q; }

function colorIsValid(color) { if (!color) return false; return typeof color.r === 'number' || typeof color.h === 'number'; }

function toHexColor(color, defaultColor) {
  if (!colorIsValid(color)) return defaultColor;
  if (typeof color.r === 'number') { if (color.a === 0) return defaultColor; return (color.r << 16) | (color.g << 8) | color.b; }
  if (typeof color.h === 'number') {
    if (color.a === 0) return defaultColor;
    const h = color.h, s = color.s;
    const hAngle = (h * 360) % 360;
    const c = s;
    const x = c * (1 - Math.abs((hAngle / 60) % 2 - 1));
    let r = 0, g = 0, b = 0;
    if (hAngle < 60) { r = c; g = x; }
    else if (hAngle < 120) { r = x; g = c; }
    else if (hAngle < 180) { g = c; b = x; }
    else if (hAngle < 240) { g = x; b = c; }
    else if (hAngle < 300) { r = x; b = c; }
    else { r = c; b = x; }
    const m = 1 - c;
    return (Math.round((r+m)*255)<<16) | (Math.round((g+m)*255)<<8) | Math.round((b+m)*255);
  }
  return defaultColor;
}

function colorOpacity(color, defaultOpacity = 1) {
  if (!colorIsValid(color)) return defaultOpacity;
  if (typeof color.r === 'number') { if (color.a === 0 || typeof color.a !== 'number') return defaultOpacity; return Math.max(0, Math.min(1, color.a / 255)); }
  if (typeof color.h === 'number') { if (color.a === 0 || typeof color.a !== 'number') return defaultOpacity; return Math.max(0, Math.min(1, color.a)); }
  return defaultOpacity;
}

function createOrbitRing(radius, orbit, color = 0x00b7ff, opacity = 0.9) {
  const q = normalizeQuaternion(orbit);
  const points = [];
  for (let i = 0; i <= 128; i++) {
    const theta = (i / 128) * Math.PI * 2;
    const point = new THREE.Vector3(Math.cos(theta) * radius, 0, Math.sin(theta) * radius);
    point.applyQuaternion(q);
    points.push(convertBlueprintPosition(point));
  }
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ color, opacity, transparent: opacity < 1 });
  return new THREE.LineLoop(geometry, material);
}

function createNodeSphere(position, id, color = 0x44ffb8, opacity = 1) {
  const geometry = new THREE.SphereGeometry(50 * currentScale, 8, 8);
  const material = new THREE.MeshStandardMaterial({ color, emissive: 0x0a2f20, metalness: 0.2, roughness: 0.6, transparent: opacity < 1, opacity });
  const sphere = new THREE.Mesh(geometry, material);
  sphere.position.copy(position);
  sphere.name = `node-${id}`;
  return sphere;
}

function createSphericalArcPoints(from, to, segments = 36) {
  const radius = (from.length() + to.length()) / 2;
  const fromN = from.clone().normalize();
  const toN = to.clone().normalize();
  const dot = THREE.MathUtils.clamp(fromN.dot(toN), -1, 1);
  const angle = Math.acos(dot);
  const axis = new THREE.Vector3().crossVectors(fromN, toN);
  if (axis.lengthSq() < 1e-6) {
    const points = [];
    for (let i = 0; i <= segments; i++) points.push(fromN.clone().lerp(toN, i / segments).normalize().multiplyScalar(radius));
    return points;
  }
  axis.normalize();
  const points = [];
  for (let i = 0; i <= segments; i++) points.push(fromN.clone().applyAxisAngle(axis, angle * i / segments).multiplyScalar(radius));
  return points;
}

function toLatLon(pos, pole = new THREE.Vector3(0, 1, 0)) {
  const r = pos.length();
  const poleN = (pole ?? new THREE.Vector3(0, 1, 0)).clone().normalize();
  const lat = Math.asin(THREE.MathUtils.clamp(pos.dot(poleN) / r, -1, 1));
  const ref = Math.abs(poleN.x) < 0.99 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
  const east = new THREE.Vector3().crossVectors(ref, poleN).normalize();
  if (east.lengthSq() < 1e-6) east.crossVectors(new THREE.Vector3(0, 0, 1), poleN).normalize();
  const north = new THREE.Vector3().crossVectors(poleN, east).normalize();
  const lon = Math.atan2(pos.dot(east), pos.dot(north));
  return { lat, lon, r };
}

function latLonToWorld(lat, lon, r, pole = new THREE.Vector3(0, 1, 0)) {
  const poleN = (pole ?? new THREE.Vector3(0, 1, 0)).clone().normalize();
  const ref = Math.abs(poleN.x) < 0.99 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
  const east = new THREE.Vector3().crossVectors(ref, poleN).normalize();
  if (east.lengthSq() < 1e-6) east.crossVectors(new THREE.Vector3(0, 0, 1), poleN).normalize();
  const north = new THREE.Vector3().crossVectors(poleN, east).normalize();
  const cosLat = Math.cos(lat);
  return new THREE.Vector3().addScaledVector(east, r * cosLat * Math.sin(lon)).addScaledVector(north, r * cosLat * Math.cos(lon)).addScaledVector(poleN, r * Math.sin(lat));
}

function createGridArcPoints(from, to, segments = 18, pole = null) {
  const safePole = pole ?? new THREE.Vector3(0, 1, 0);
  const a = toLatLon(from, safePole);
  const b = toLatLon(to, safePole);
  const nearPoleThreshold = Math.PI / 2 - 1e-3;
  if (Math.abs(a.lat) > nearPoleThreshold) a.lon = b.lon;
  if (Math.abs(b.lat) > nearPoleThreshold) b.lon = a.lon;
  let dLon = b.lon - a.lon;
  dLon -= Math.floor(dLon / (2 * Math.PI)) * (2 * Math.PI);
  if (dLon > Math.PI) dLon -= 2 * Math.PI;
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    points.push(latLonToWorld(a.lat + t * (b.lat - a.lat), a.lon + t * dLon, a.r + t * (b.r - a.r), safePole));
  }
  return points;
}

function createLineSegment(from, to, color = 0xffffff, type = 0, pole = null) {
  const points = (type === 1 && pole) ? createGridArcPoints(from, to, 18, pole) : createSphericalArcPoints(from, to, 18);
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ color, linewidth: 2 });
  return new THREE.Line(geometry, material);
}

function createFaceMesh(points, color = 0x00b7ff, opacity = 0.25, pole = null, edgeTypes = null) {
  if (points.length < 3) return null;
  const spherePoints = points.map((p) => p.clone());
  if (edgeTypes) {
    const geoSegs = 3, gridSegs = 5;
    const refined = [];
    for (let i = 0; i < points.length; i++) {
      const from = points[i], to = points[(i+1) % points.length];
      const sub = edgeTypes[i] === 1 && pole ? createGridArcPoints(from, to, gridSegs, pole) : createSphericalArcPoints(from, to, geoSegs);
      for (let j = 0; j < sub.length - 1; j++) refined.push(sub[j]);
    }
    return createFaceMesh(refined, color, opacity, pole, null);
  }
  const vertices = [], indices = [];
  const addVertex = (vertex) => { vertices.push(vertex.x, vertex.y, vertex.z); return (vertices.length / 3) - 1; };
  const subdivideTriangleSpherical = (a, b, c, divisions = 3) => {
    const ra = a.length(), rb = b.length(), rc = c.length();
    const rowIndices = [];
    for (let i = 0; i <= divisions; i++) {
      const row = [];
      for (let j = 0; j <= divisions - i; j++) {
        const k = divisions - i - j;
        const tA = i / divisions, tB = j / divisions, tC = k / divisions;
        const r = tA * ra + tB * rb + tC * rc;
        const point = new THREE.Vector3().addScaledVector(a, tA).addScaledVector(b, tB).addScaledVector(c, tC).normalize().multiplyScalar(r);
        row.push(addVertex(point));
      }
      rowIndices.push(row);
    }
    for (let i = 0; i < rowIndices.length - 1; i++) {
      const current = rowIndices[i], next = rowIndices[i + 1];
      for (let j = 0; j < current.length - 1; j++) {
        indices.push(current[j], current[j+1], next[j]);
        if (j < current.length - 2) indices.push(current[j+1], next[j+1], next[j]);
      }
    }
  };
  function earClipFlat(polygon) {
    const triangles = [], remaining = polygon.slice();
    function signedArea(a, b, c) { return (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x); }
    function isConvex(prev, curr, next) { return signedArea(prev, curr, next) > 0; }
    function pointInTriangle(pt, a, b, c) { const d1 = signedArea(pt, a, b), d2 = signedArea(pt, b, c), d3 = signedArea(pt, c, a); return !((d1 < 0 || d2 < 0 || d3 < 0) && (d1 > 0 || d2 > 0 || d3 > 0)); }
    while (remaining.length > 3) {
      let earFound = false;
      for (let i = 0; i < remaining.length; i++) {
        const prev = remaining[(i-1+remaining.length)%remaining.length], curr = remaining[i], next = remaining[(i+1)%remaining.length];
        if (!isConvex(prev, curr, next)) continue;
        let isEar = true;
        for (let j = 0; j < remaining.length; j++) { if (j === (i-1+remaining.length)%remaining.length || j === i || j === (i+1)%remaining.length) continue; if (pointInTriangle(remaining[j], prev, curr, next)) { isEar = false; break; } }
        if (isEar) { triangles.push([prev.idx, curr.idx, next.idx]); remaining.splice(i, 1); earFound = true; break; }
      }
      if (!earFound) { const base = remaining[0]; for (let i = 1; i < remaining.length - 1; i++) triangles.push([base.idx, remaining[i].idx, remaining[i+1].idx]); break; }
    }
    if (remaining.length === 3) triangles.push([remaining[0].idx, remaining[1].idx, remaining[2].idx]);
    return triangles;
  }
  const faceNormal = new THREE.Vector3();
  for (let i = 0; i < spherePoints.length; i++) { const curr = spherePoints[i], next = spherePoints[(i+1)%spherePoints.length]; faceNormal.x += (curr.y - next.y)*(curr.z + next.z); faceNormal.y += (curr.z - next.z)*(curr.x + next.x); faceNormal.z += (curr.x - next.x)*(curr.y + next.y); }
  faceNormal.normalize();
  const refX = Math.abs(faceNormal.x) < 0.99 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
  const axisU = new THREE.Vector3().crossVectors(refX, faceNormal).normalize();
  const axisV = new THREE.Vector3().crossVectors(faceNormal, axisU).normalize();
  const centroid3D = spherePoints.reduce((acc, p) => acc.add(p), new THREE.Vector3()).multiplyScalar(1/spherePoints.length);
  const flatPoints = spherePoints.map((p) => { const d = p.clone().sub(centroid3D); return { x: d.dot(axisU), y: d.dot(axisV) }; });
  const polygon = flatPoints.map((p, idx) => ({ x: p.x, y: p.y, idx }));
  const triangles_2d = earClipFlat(polygon);
  triangles_2d.forEach(([aIdx, bIdx, cIdx]) => { if (aIdx < spherePoints.length && bIdx < spherePoints.length && cIdx < spherePoints.length) subdivideTriangleSpherical(spherePoints[aIdx], spherePoints[bIdx], spherePoints[cIdx], 3); });
  if (triangles_2d.length === 0) return null;
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  const material = new THREE.MeshStandardMaterial({ color, opacity, transparent: opacity < 1, side: THREE.DoubleSide, depthWrite: true });
  return new THREE.Mesh(geometry, material);
}

function edgeKey(id1, id2) { return id1 < id2 ? `${id1}-${id2}` : `${id2}-${id1}`; }

// 从解析好的蓝图数据重建 3D 场景、统计和发电量（不重新解析）
function renderFromParsed(parsed, isRecalc = false) {
  if (!isRecalc) lastParsedData = parsed;

  const cloud = parsed.body.dysonCloud;
  const shell = parsed.body.dysonShell ?? (parsed.body.singleShell ? { shells: [parsed.body.singleShell], orbitList: [{ id: 0, radius: 10000.0, x: 0, y: 0, z: 0, w: 1 }] } : null);
  const shellOrbitRadii = shell?.orbitList?.filter(Boolean).map((o) => o.radius) ?? [];
  const cloudOrbitRadii = cloud?.orbits?.filter(Boolean).map((o) => o.radius) ?? [];
  const allRadii = shellOrbitRadii.concat(cloudOrbitRadii);
  const maxRadius = allRadii.length > 0 ? Math.max(1, ...allRadii) : (shell?.shells?.[0]?.nodes ? Math.max(1, ...shell.shells[0].nodes.slice(1).filter(Boolean).map(n => Math.hypot(n.coordinate.x, n.coordinate.y, n.coordinate.z))) : 1);

  const baseSphereRadius = 1;
  rootGroup.add(new THREE.Mesh(new THREE.SphereGeometry(baseSphereRadius, 48, 32), new THREE.MeshStandardMaterial({ color: 0x112946, opacity: 0.0, transparent: true })));

  if (shell?.orbitList) {
    let hasFillGridWarning = false;
    for (const orbit of shell.orbitList) {
      if (!orbit) continue;
      const shData = shell.shells?.[orbit.id] ?? null;
      if (!hasFillGridWarning && shData?.fillGrid?.colors) {
        for (const cc of shData.fillGrid.colors) { if (cc && cc.a) { hasFillGridWarning = true; break; } }
      }
    }
    if (hasFillGridWarning) addStat('<span style="color: #e6b800;">⚠ 蓝图含有网格涂色</span> ', '当前不支持蓝图的网格涂色，颜色不能正确显示');
  }

  addStat('蓝图信息', '蓝图类型：'+(parsed.header.typeName || '未知')+'<br>'+'蓝图版本：'+parsed.header.version+'<br>'+'创建时间：'+parsed.header.createdAt);

  const radiusLabel = document.getElementById('radiusLabel');
  const radiusInput = document.getElementById('shellRadiusInput');
  const lumInput = document.getElementById('luminosityInput');
  const isSingleShell = parsed.header.typeId === 1;

  if (!isRecalc) {
    if (isSingleShell) { radiusLabel.textContent = '半径'; radiusInput.value = 10000; }
    else { radiusLabel.textContent = '最大半径'; radiusInput.value = maxRadius; }
  } else {
    radiusLabel.textContent = isSingleShell ? '半径' : '最大半径';
  }

  const userRadius = parseFloat(radiusInput.value) || 10000;
  currentScale = isSingleShell ? (1 / userRadius) : (1 / maxRadius);
  const powerResult = computePoints(parsed, userRadius, isSingleShell ? null : userRadius);
  const powerMain = document.getElementById('powerMain');

  const fmtKW = (kw) => {
    if (kw === 0) return '0 W';
    if (kw >= 1e9) return (kw/1e9).toPrecision(3)+' TW';
    if (kw >= 1e6) return (kw/1e6).toPrecision(3)+' GW';
    if (kw >= 1e3) return (kw/1e3).toPrecision(3)+' MW';
    return kw.toPrecision(3)+' kW';
  };

  if (!powerResult) { powerMain.textContent = '⚡ 0 W'; gPowerResult = null; gFmtKW = null; }
  else {
    const lum = parseFloat(lumInput.value) || 1.0;
    powerResult.totalPower = computePower(powerResult, lum);
    powerMain.textContent = '⚡ '+fmtKW(powerResult.totalPower);
    gPowerResult = powerResult; gFmtKW = fmtKW;
    updateSunColor(lum);
  }

  if (cloud?.orbits) {
    cloud.orbits.forEach((orb, idx) => {
      if (!orb) return;
      const adjCloudR = Math.min(orb.radius, userRadius);
      const op = quaternionToOrbitParams(orb);
      const ed = cloud.visibility ? !!isVisible(cloud.visibility.editor, orb.id) : true;
      const gv = cloud.visibility ? !!isVisible(cloud.visibility.inGame, orb.id) : true;
      const def = gv;
      const radStr = (Math.abs(adjCloudR - orb.radius) > 0.5) ? '蓝图半径 '+orb.radius.toFixed(0)+' → 实际半径 '+adjCloudR.toFixed(0)+'<br>' : '半径 '+orb.radius.toFixed(1)+' / ';
      const val = radStr+'倾角 '+op.inclination.toFixed(0)+'° / 升交点 '+op.ascendingNode.toFixed(1)+'°'+'<br>编辑器'+(ed?'显示':'不显示')+' / 游戏内'+(gv?'显示':'不显示');
      addStatToggle('cloud_'+orb.id, '云轨道 '+orb.id, val, def);
      const r = adjCloudR * currentScale;
      const e = cloud.colors?.[orb.id] ?? cloud.colors?.[orb.id-1] ?? cloud.colors?.[idx];
      const ring = createOrbitRing(r, orb, toHexColor(e, 0xffcba6), colorOpacity(e, 0.9));
      ring.name = 'cloud-orbit-'+idx; ring.visible = def;
      visObjects.set('cloud_'+orb.id, ring); rootGroup.add(ring);
    });
  }

  const adjustedRadii = new Map();
  if (!isSingleShell && shell) {
    const validOrbits = shell.orbitList.filter(o => o && shell.shells[o.id]);
    const sorted = [...validOrbits].sort((a, b) => b.radius - a.radius);
    let next = userRadius;
    for (const orbit of sorted) {
      const r = Math.min(orbit.radius, next); adjustedRadii.set(orbit.id, r);
      next = r - 1000; if (next < 1000) next = 1000;
    }
  }

  shellGroups = [];
  if (shell?.orbitList) {
    for (let i = 0; i < shell.orbitList.length; i++) {
      const orbit = shell.orbitList[i];
      if (!orbit) continue;
      const shData = shell.shells?.[orbit.id] ?? null;
      const nodeCnt = shData?.nodes ? shData.nodes.filter(Boolean).length : 0;
      const frameCnt = shData?.frames ? shData.frames.filter(Boolean).length : 0;
      const faceCnt = shData?.faces ? shData.faces.filter(Boolean).length : 0;
      const ed = shell.visibility ? !!isVisible(shell.visibility.editor, orbit.id) : true;
      const gv = shell.visibility ? !!isVisible(shell.visibility.inGame, orbit.id) : true;
      const def = gv;
      const layerData = powerResult?.layers.find(l => l.orbitId === orbit.id);
      if (parsed.header.typeId === 1) {
        addStat('壳层', '节点'+nodeCnt+' 框架'+frameCnt+' 壳面'+faceCnt+'<br>结构点数'+(layerData?.totalStructurePoints||0)+' / 细胞点数'+(layerData?.totalCellPoints||0));
      } else {
        const op = quaternionToOrbitParams(orbit);
        const adjR = layerData?.radius ?? orbit.radius;
        const origR = layerData?.originalRadius ?? orbit.radius;
        const radiusStr = (Math.abs(adjR - origR) > 0.5) ? '蓝图半径 '+origR.toFixed(0)+' → 实际半径 '+adjR.toFixed(0)+'<br>' : '半径 '+orbit.radius.toFixed(1)+' / ';
        const val = radiusStr+'倾角 '+op.inclination.toFixed(1)+'° / 升交点 '+op.ascendingNode.toFixed(1)+'°'+'<br>节点'+nodeCnt+' / 框架'+frameCnt+' / 壳面'+faceCnt+'<br>结构点数'+(layerData?.totalStructurePoints||0)+' / 细胞点数'+(layerData?.totalCellPoints||0)+'<br>编辑器'+(ed?'显示':'不显示')+' / 游戏内'+(gv?'显示':'不显示');
        addStatToggle('shell_'+orbit.id, '壳轨道 '+orbit.id, val, def);
      }
      if (!shData) continue;
      const renderR = isSingleShell ? userRadius : (adjustedRadii.get(orbit.id) ?? orbit.radius);
      const shQuat = normalizeQuaternion(orbit);
      const poleRaw = new THREE.Vector3(0, 1, 0); poleRaw.applyQuaternion(shQuat);
      const shPole = convertBlueprintPosition(poleRaw);
      const shellGroup = new THREE.Group();
      shellGroups.push({ group: shellGroup, pole: shPole.clone().normalize(), radius: renderR });
      const nodeMap = new Map();
      if (shData.nodes) {
        for (let ni = 1; ni < shData.nodes.length; ni++) {
          const nd = shData.nodes[ni];
          if (!nd) continue;
          const d = new THREE.Vector3(nd.coordinate.x, nd.coordinate.y, nd.coordinate.z).normalize();
          d.applyQuaternion(shQuat);
          const pos = convertBlueprintPosition(d).multiplyScalar(renderR * currentScale);
          nodeMap.set(nd.id, pos);
          shellGroup.add(createNodeSphere(pos, nd.id, toHexColor(nd.color, 0x60D6FD), colorOpacity(nd.color, 1)));
        }
      }
      const renderedEdges = new Set();
      const ftMap = new Map();
      const re = (id1, id2, color, type = 0) => {
        const k = id1 < id2 ? id1+"-"+id2 : id2+"-"+id1;
        if (renderedEdges.has(k)) return;
        renderedEdges.add(k);
        const f = nodeMap.get(id1), t = nodeMap.get(id2);
        if (f && t) shellGroup.add(createLineSegment(f, t, color, type, shPole));
      };
      if (shData.frames) {
        shData.frames.forEach((fr) => {
          if (!fr) return;
          const k = edgeKey(fr.structureRelation[0], fr.structureRelation[1]);
          ftMap.set(k, fr.type);
          re(fr.structureRelation[0], fr.structureRelation[1], toHexColor(fr.color, 0x175473), fr.type);
        });
      }
      if (shData.faces) {
        shData.faces.forEach((fc) => {
          if (!fc || !Array.isArray(fc.relation) || fc.relation.length < 3) return;
          if (fc.relation.some(nid => !nodeMap.has(nid))) return;
          const rel = fc.relation.slice();
          const pts = rel.map(nid => nodeMap.get(nid));
          if (pts.some(p => !p)) return;
          const edgeTypes = rel.map((_, j) => ftMap.get(edgeKey(rel[j], rel[(j+1)%rel.length])) ?? 0);
          const m = createFaceMesh(pts, toHexColor(fc.color, 0x175473), colorOpacity(fc.color, 1), shPole, edgeTypes);
          if (m) shellGroup.add(m);
        });
      }
      shellGroup.visible = def;
      visObjects.set('shell_'+orbit.id, shellGroup);
      rootGroup.add(shellGroup);
    }
  }

  createLongitudeGrid(baseSphereRadius * 1.2);
  camera.position.set(0, baseSphereRadius * 2.2, baseSphereRadius * 3.2);
  controls.target.set(0, 0, 0);
  controls.update();
}

function parseAndRender(blueprintText) {
  clearScene();
  clearStats();
  return parseBlueprintString(blueprintText).then((parsed) => {
    renderFromParsed(parsed, false);
  }).catch((error) => {
    lastParsedData = null;
    clearScene();
    clearStats();
    addStat('❌ 解析失败', error.message);
  });
}

// 光度系数变化：即时更新功率和恒星颜色，无需重新解析
let gPowerResult = null;
let gFmtKW = null;
const lumInput = document.getElementById('luminosityInput');
lumInput.addEventListener('input', () => {
  const val = parseFloat(lumInput.value);
  if (isNaN(val)) return;
  if (val <= 0) lumInput.value = 0.1;
  if (val > 10) lumInput.value = 10;
  const lum = parseFloat(lumInput.value) || 1.0;
  updateSunColor(lum);
  if (gPowerResult && gFmtKW) {
    gPowerResult.totalPower = computePower(gPowerResult, lum);
    document.getElementById('powerMain').textContent = '⚡ '+gFmtKW(gPowerResult.totalPower);
  }
});

// 半径输入约束：最大半径≥10000，半径≥1000
const radiusInput = document.getElementById('shellRadiusInput');
radiusInput.addEventListener('input', () => {
  const val = parseFloat(radiusInput.value);
  if (isNaN(val)) return;
  const labelText = document.getElementById('radiusLabel').textContent;
  if (labelText === '最大半径' && val < 10000) radiusInput.value = 10000;
  if (labelText === '半径' && val < 1000) radiusInput.value = 1000;
});

// 重新计算按钮：跳过解析，直接从 lastParsedData 重新构建
let lastParsedData = null;
const recalcButton = document.getElementById('recalcButton');
recalcButton.addEventListener('click', () => {
  if (!lastParsedData) return;
  recalcButton.disabled = true;
  parseButton.disabled = true;
  parseButton.textContent = '重新计算中...';
  // 延迟执行让浏览器渲染按钮禁用状态
  setTimeout(() => {
    clearScene();
    clearStats();
    renderFromParsed(lastParsedData, true);
    recalcButton.disabled = false;
    parseButton.disabled = false;
    parseButton.textContent = '解析并预览';
  }, 0);
});

parseButton.addEventListener('click', async () => {
  const text = blueprintInput.value.trim();
  if (!text) return;
  lastParsedData = null;
  parseButton.disabled = true;
  parseButton.textContent = '解析中...';
  recalcButton.disabled = true;
  await parseAndRender(text);
  if (lastParsedData) recalcButton.disabled = false;
  parseButton.disabled = false;
  parseButton.textContent = '解析并预览';
});
</script>
